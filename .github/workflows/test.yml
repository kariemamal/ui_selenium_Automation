name: Selenium Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        testClass: [ EmployeeTest, RecruitmentTest ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'


      - name: Start Selenium Grid
        run: |
            docker network create grid || true
            
            docker run -d --name selenium-hub \
              --network grid \
              -p 4444:4444 \
              selenium/hub:4.20.0
            
            docker run -d --name chrome-node-1 \
              --network grid \
              -e SE_EVENT_BUS_HOST=selenium-hub \
              -e SE_EVENT_BUS_PUBLISH_PORT=4442 \
              -e SE_EVENT_BUS_SUBSCRIBE_PORT=4443 \
              selenium/node-chrome:4.20.0
            
            docker run -d --name chrome-node-2 \
              --network grid \
              -e SE_EVENT_BUS_HOST=selenium-hub \
              -e SE_EVENT_BUS_PUBLISH_PORT=4442 \
              -e SE_EVENT_BUS_SUBSCRIBE_PORT=4443 \
              selenium/node-chrome:4.20.0

      - name: Print Runner Info
        run: |
          echo "RUNNER_NAME: $RUNNER_NAME"
          echo "RUNNER_OS: $RUNNER_OS"
          echo "RUNNER_ARCH: $RUNNER_ARCH"
          echo "HOSTNAME:"
          hostname
          
          # ✅ 2. اطبع الـ Public IP
      - name: Print Public IP
        run: |
          echo "Public IP:"
          curl -s ifconfig.me
          
          # ✅ 3. اطبع GitHub runner context
      - name: Print Runner Context
        run: echo '${{ toJson(runner) }}'

      #      - name: wait for selenium grid
      #        run: |
      #          for i in {1..10}; do
      #            curl -s http://localhost:4444/status && break
      #            sleep 2
      #          done

      - name: run tests
        run: mvn clean test \
          -Dexecution.mode=remote \
          -Dtest=${{ matrix.testClass }}

      - name: Save Machine Info
        run: |
            echo "Test Class: ${{ matrix.testClass }}" > machine-info.txt
            echo "Runner: $RUNNER_NAME" >> machine-info.txt
            echo "Hostname: $(hostname)" >> machine-info.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
         name: results-${{ matrix.testClass }}
         path: machine-info.txt
